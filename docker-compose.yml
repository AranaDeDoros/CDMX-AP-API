version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4-alpine
    container_name: cdmx-db
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: cdmx
    ports:
      - "5432:5432"
    volumes:
      - ./src/main/resources/dump-cdmx-202603182028.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d cdmx"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: cdmx-api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_NAME=cdmx
      - DB_USER=test_user
      - DB_PASS=123456
    depends_on:
      db:
        condition: service_healthy
